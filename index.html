<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Gyankunj Academy CodeLab | Modern Code Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f1f5f9;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --border: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --header-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.dark {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --surface: #1e293b;
      --surface-2: #0f172a;
      --border: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --accent: #60a5fa;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: var(--transition);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    .top-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      background: var(--header-gradient);
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      box-shadow: var(--shadow-md);
    }

    .logo-text {
      font-weight: 700;
      font-size: 1.25rem;
      background: var(--header-gradient);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .badge {
      font-size: 0.7rem;
      background: var(--bg-secondary);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-weight: 500;
    }

    .action-buttons {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-primary);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .btn:hover {
      transform: translateY(-1px);
      background: var(--border);
    }

    .split-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .editors-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      background: var(--surface-2);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .editor-tab-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0.75rem;
      gap: 1rem;
    }

    .editor-card {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      min-height: 0;
    }

    .editor-header {
      padding: 0.7rem 1rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .editor-header i {
      color: var(--accent);
    }

    .monaco-container {
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    .preview-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }

    .preview-header {
      padding: 0.7rem 1rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
    }

    .preview-frame {
      flex: 1;
      background: white;
      margin: 1rem;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    .resize-handle {
      width: 6px;
      background: var(--border);
      cursor: col-resize;
      transition: background 0.2s;
      z-index: 20;
    }
    .resize-handle:hover {
      background: var(--accent);
    }

    .fullscreen-preview {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      background: #fff;
      display: none;
      flex-direction: column;
    }
    .fullscreen-preview.active {
      display: flex;
    }
    .fullscreen-header {
      padding: 1rem;
      background: #1e293b;
      display: flex;
      justify-content: flex-end;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--surface);
      border-left: 4px solid var(--accent);
      padding: 12px 20px;
      border-radius: 40px;
      box-shadow: var(--shadow-md);
      z-index: 1500;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div class="app">
  <div class="top-bar">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-code"></i></div>
      <span class="logo-text">Gyankunj Academy Code-Lab</span>
      <span class="badge">⚡ Live Editor</span>
    </div>
    <div class="action-buttons">
      <button id="runBtn" class="btn btn-primary"><i class="fas fa-play"></i> Run Code</button>
      <button id="resetBtn" class="btn"><i class="fas fa-undo-alt"></i> Reset</button>
      <button id="downloadBtn" class="btn"><i class="fas fa-download"></i> HTML</button>
      <button id="copyBtn" class="btn"><i class="fas fa-copy"></i> Copy</button>
      <button id="fullscreenBtn" class="btn"><i class="fas fa-expand"></i> Full Preview</button>
      <button id="themeToggle" class="btn"><i class="fas fa-moon"></i> Dark/Light</button>
      <button id="installBtn" class="btn" style="display: none;"><i class="fas fa-download"></i> Install App</button>
    </div>
  </div>
  <div class="split-layout">
    <div class="editors-panel" id="editorsPanel">
      <div class="editor-tab-group">
        <div class="editor-card">
          <div class="editor-header"><i class="fab fa-html5"></i> HTML</div>
          <div id="htmlEditor" class="monaco-container"></div>
        </div>
        <div class="editor-card">
          <div class="editor-header"><i class="fab fa-css3-alt"></i> CSS</div>
          <div id="cssEditor" class="monaco-container"></div>
        </div>
        <div class="editor-card">
          <div class="editor-header"><i class="fab fa-js"></i> JavaScript</div>
          <div id="jsEditor" class="monaco-container"></div>
        </div>
      </div>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="preview-panel" id="previewPanel">
      <div class="preview-header">
        <span><i class="fas fa-eye"></i> Live Preview</span>
        <span style="font-size: 0.7rem;"><i class="fas fa-sync-alt"></i> Auto-run enabled</span>
      </div>
      <div class="preview-frame">
        <iframe id="previewIframe" title="Live Output" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
      </div>
    </div>
  </div>
</div>
<div class="fullscreen-preview" id="fullscreenPreview">
  <div class="fullscreen-header"><button id="closeFullscreen" class="btn" style="background:#fff;color:#000;">Close</button></div>
  <iframe id="fullscreenIframe" style="flex:1; border:none;"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
  // Default demo content
  const DEFAULT_HTML = `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Preview</title>
</head>
<body>
  <div class="container">
    <h1>✨ Gyankunj CodeLab</h1>
    <p>Edit HTML, CSS & JS in real-time</p>
    <button id="clickBtn">Click Me!</button>
    <div id="message" class="message"></div>
  </div>
</body>
</html>`;

  const DEFAULT_CSS = `body {
  font-family: 'Inter', system-ui;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 0;
  padding: 20px;
}
.container {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  border-radius: 32px;
  padding: 2rem;
  box-shadow: 0 25px 45px rgba(0,0,0,0.2);
  text-align: center;
  max-width: 500px;
  transition: transform 0.3s;
}
.container:hover {
  transform: scale(1.02);
}
h1 {
  color: #4f46e5;
  margin-bottom: 0.5rem;
}
button {
  background: #4f46e5;
  border: none;
  padding: 10px 24px;
  border-radius: 40px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 1rem;
  transition: all 0.2s;
}
button:hover {
  background: #6366f1;
  transform: translateY(-2px);
}
.message {
  margin-top: 1rem;
  font-weight: 500;
  color: #0f172a;
}`;

  const DEFAULT_JS = `document.getElementById('clickBtn')?.addEventListener('click', () => {
  const msgDiv = document.getElementById('message');
  msgDiv.innerHTML = '🎉 Awesome! Code is live! 🚀';
  msgDiv.style.animation = 'fadeIn 0.5s';
});
console.log('Gyankunj Academy CodeLab is ready!');`;

  // Global variables
  let htmlEditor, cssEditor, jsEditor;
  let currentTheme = localStorage.getItem('theme') || 'light';
  let resizeActive = false;
  let monacoReady = false;

  // DOM elements
  const previewIframe = document.getElementById('previewIframe');
  const fullscreenIframe = document.getElementById('fullscreenIframe');
  const runBtn = document.getElementById('runBtn');
  const resetBtn = document.getElementById('resetBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const copyBtn = document.getElementById('copyBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const themeToggle = document.getElementById('themeToggle');
  const installBtn = document.getElementById('installBtn');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const fullscreenDiv = document.getElementById('fullscreenPreview');
  const closeFullscreen = document.getElementById('closeFullscreen');

  // Helper: show toast notification
  function showToast(msg) {
    let toast = document.querySelector('.toast');
    if (toast) toast.remove();
    const div = document.createElement('div');
    div.className = 'toast';
    div.innerHTML = `<i class="fas fa-check-circle" style="color:var(--accent); margin-right:8px;"></i> ${msg}`;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2500);
  }

  // Build final HTML from editors
  function buildFinalHTML() {
    if (!htmlEditor || !cssEditor || !jsEditor) return "<html><body>Loading editors...</body></html>";
    let html = htmlEditor.getValue();
    const css = cssEditor.getValue();
    const js = jsEditor.getValue();

    // Inject CSS and JS intelligently
    let finalDoc = html;
    const styleTag = `<style>\n/* Custom CSS */\n${css}\n</style>`;
    const scriptTag = `<script>\n/* Custom JS */\n${js}\n<\/script>`;

    if (finalDoc.includes('</head>')) {
      finalDoc = finalDoc.replace('</head>', `${styleTag}</head>`);
    } else if (finalDoc.includes('<head>')) {
      finalDoc = finalDoc.replace('<head>', `<head>${styleTag}`);
    } else {
      finalDoc = `<head>${styleTag}</head>${finalDoc}`;
    }

    if (finalDoc.includes('</body>')) {
      finalDoc = finalDoc.replace('</body>', `${scriptTag}</body>`);
    } else {
      finalDoc = finalDoc + scriptTag;
    }
    return finalDoc;
  }

  // Update preview iframe
  function updatePreview() {
    const fullHtml = buildFinalHTML();
    previewIframe.srcdoc = fullHtml;
    if (fullscreenIframe) fullscreenIframe.srcdoc = fullHtml;
  }

  // Debounced auto-run
  let debounceTimer;
  function debouncedPreview() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
      updatePreview();
    }, 300);
  }

  // Save to localStorage
  function saveToLocal() {
    if (htmlEditor) localStorage.setItem('gyankunj_html', htmlEditor.getValue());
    if (cssEditor) localStorage.setItem('gyankunj_css', cssEditor.getValue());
    if (jsEditor) localStorage.setItem('gyankunj_js', jsEditor.getValue());
  }

  // Load from localStorage or defaults
  function loadFromLocal() {
    const savedHtml = localStorage.getItem('gyankunj_html');
    const savedCss = localStorage.getItem('gyankunj_css');
    const savedJs = localStorage.getItem('gyankunj_js');
    return {
      html: savedHtml || DEFAULT_HTML,
      css: savedCss || DEFAULT_CSS,
      js: savedJs || DEFAULT_JS
    };
  }

  // Apply theme to Monaco and body
  function applyTheme(theme) {
    currentTheme = theme;
    localStorage.setItem('theme', theme);
    if (theme === 'dark') {
      document.body.classList.add('dark');
      if (monacoReady) monaco.editor.setTheme('vs-dark');
      themeToggle.innerHTML = '<i class="fas fa-sun"></i> Light';
    } else {
      document.body.classList.remove('dark');
      if (monacoReady) monaco.editor.setTheme('vs');
      themeToggle.innerHTML = '<i class="fas fa-moon"></i> Dark';
    }
  }

  // Initialize Monaco editors
  function initMonaco() {
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
    require(['vs/editor/editor.main'], function() {
      monacoReady = true;
      const saved = loadFromLocal();
      
      htmlEditor = monaco.editor.create(document.getElementById('htmlEditor'), {
        value: saved.html,
        language: 'html',
        theme: currentTheme === 'dark' ? 'vs-dark' : 'vs',
        automaticLayout: true,
        fontSize: 13,
        minimap: { enabled: false },
        lineNumbers: 'on',
        autoClosingBrackets: 'always',
        autoClosingTags: true,
        scrollBeyondLastLine: false
      });

      cssEditor = monaco.editor.create(document.getElementById('cssEditor'), {
        value: saved.css,
        language: 'css',
        theme: currentTheme === 'dark' ? 'vs-dark' : 'vs',
        automaticLayout: true,
        fontSize: 13,
        minimap: { enabled: false },
        lineNumbers: 'on'
      });

      jsEditor = monaco.editor.create(document.getElementById('jsEditor'), {
        value: saved.js,
        language: 'javascript',
        theme: currentTheme === 'dark' ? 'vs-dark' : 'vs',
        automaticLayout: true,
        fontSize: 13,
        minimap: { enabled: false },
        lineNumbers: 'on'
      });

      // Event listeners for auto-save and preview
      htmlEditor.onDidChangeModelContent(() => { saveToLocal(); debouncedPreview(); });
      cssEditor.onDidChangeModelContent(() => { saveToLocal(); debouncedPreview(); });
      jsEditor.onDidChangeModelContent(() => { saveToLocal(); debouncedPreview(); });

      // Initial preview
      updatePreview();

      // Hide loading overlay with animation
      loadingOverlay.style.opacity = '0';
      setTimeout(() => { loadingOverlay.style.display = 'none'; }, 400);
    });
  }

  // Resizable panels
  const editorsPanel = document.getElementById('editorsPanel');
  const previewPanel = document.getElementById('previewPanel');
  const handle = document.getElementById('resizeHandle');

  function onMouseMove(e) {
    if (!resizeActive) return;
    const containerRect = document.querySelector('.split-layout').getBoundingClientRect();
    let newLeftWidth = ((e.clientX - containerRect.left) / containerRect.width) * 100;
    newLeftWidth = Math.min(75, Math.max(25, newLeftWidth));
    editorsPanel.style.width = `${newLeftWidth}%`;
    previewPanel.style.width = `${100 - newLeftWidth}%`;
    // Force Monaco layout update
    if (htmlEditor) htmlEditor.layout();
    if (cssEditor) cssEditor.layout();
    if (jsEditor) jsEditor.layout();
  }

  function stopResize() {
    resizeActive = false;
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', stopResize);
    document.body.style.userSelect = '';
  }

  handle.addEventListener('mousedown', (e) => {
    resizeActive = true;
    document.body.style.userSelect = 'none';
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', stopResize);
    e.preventDefault();
  });

  // Button event handlers
  runBtn.addEventListener('click', () => {
    updatePreview();
    showToast('✅ Code executed!');
  });

  resetBtn.addEventListener('click', () => {
    if (htmlEditor) htmlEditor.setValue(DEFAULT_HTML);
    if (cssEditor) cssEditor.setValue(DEFAULT_CSS);
    if (jsEditor) jsEditor.setValue(DEFAULT_JS);
    saveToLocal();
    updatePreview();
    showToast('🔄 Reset to default demo');
  });

  downloadBtn.addEventListener('click', () => {
    const fullHtml = buildFinalHTML();
    const blob = new Blob([fullHtml], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'gyankunj_codelab.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('📁 HTML file downloaded!');
  });

  copyBtn.addEventListener('click', async () => {
    const fullHtml = buildFinalHTML();
    try {
      await navigator.clipboard.writeText(fullHtml);
      showToast('📋 Full HTML copied to clipboard!');
    } catch (err) {
      showToast('❌ Copy failed');
    }
  });

  fullscreenBtn.addEventListener('click', () => {
    updatePreview();
    fullscreenDiv.classList.add('active');
  });
  closeFullscreen.addEventListener('click', () => {
    fullscreenDiv.classList.remove('active');
  });

  themeToggle.addEventListener('click', () => {
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    applyTheme(newTheme);
  });

  // PWA: Generate manifest and register service worker
  function setupPWA() {
    const manifestObj = {
      name: "Gyankunj Academy CodeLab",
      short_name: "CodeLab",
      description: "Online HTML/CSS/JS editor",
      start_url: ".",
      display: "standalone",
      theme_color: "#3b82f6",
      background_color: "#0f172a",
      icons: [{
        src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233b82f6'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white' font-weight='bold'%3EGK%3C/text%3E%3C/svg%3E",
        sizes: "any",
        type: "image/svg+xml"
      }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifestObj)], { type: 'application/json' });
    const manifestURL = URL.createObjectURL(manifestBlob);
    let linkManifest = document.querySelector('link[rel="manifest"]');
    if (linkManifest) linkManifest.href = manifestURL;
    else {
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestURL;
      document.head.appendChild(link);
    }

    if ('serviceWorker' in navigator) {
      const swCode = `self.addEventListener('install', e => e.waitUntil(caches.open('gyankunj-v1').then(c => c.addAll(['./']))));
self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));`;
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(console.log);
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-flex';
    });
    installBtn.addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => installBtn.style.display = 'none');
      } else {
        showToast('Install not supported');
      }
    });
  }

  // Initialize everything
  applyTheme(currentTheme);
  initMonaco();
  setupPWA();

  // Ensure iframe resizes with window
  window.addEventListener('resize', () => {
    if (htmlEditor) htmlEditor.layout();
    if (cssEditor) cssEditor.layout();
    if (jsEditor) jsEditor.layout();
  });
</script>
</body>
</html>
